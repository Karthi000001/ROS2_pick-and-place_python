# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────
# Continuous Integration: run tests on every push.
#
# This ensures the project is always in a working state —
# an important quality signal for a portfolio project.
# ─────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run demo (smoke test)
        run: python main.py
